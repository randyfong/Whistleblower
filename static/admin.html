<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whistleblower Admin - Evidence Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #a1a1aa;
            font-family: 'JetBrains+Mono', monospace;
        }

        .glass {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen p-8">
    <header class="mb-12 flex justify-between items-end border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-2xl font-bold text-white uppercase tracking-widest">Evidence Vault</h1>
            <p class="text-xs text-gray-600 mt-1">RECIPIENT PORTAL // UNRESTRICTED ACCESS</p>
            <button id="clear-vault-btn"
                class="mt-4 px-3 py-1.5 border border-red-500/30 text-red-500 text-[10px] font-bold uppercase hover:bg-red-500 hover:text-white transition-all rounded">
                Clear Vault
            </button>
        </div>
        <div class="flex gap-8 text-right">
            <div>
                <span id="file-count" class="text-emerald-500 font-bold text-lg">0</span>
                <p class="text-[10px] text-gray-500 uppercase tracking-tighter">Verified Ingests</p>
            </div>
            <div>
                <span id="msg-count" class="text-blue-500 font-bold text-lg">0</span>
                <p class="text-[10px] text-gray-500 uppercase tracking-tighter">Chat Events</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- Left: Evidence Grid -->
        <div class="lg:col-span-2">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> Media Evidence
            </h2>
            <div id="evidence-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Items will be injected here -->
            </div>
        </div>

        <!-- Right: Chronological Log -->
        <div class="lg:col-span-1">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> Transmission Log
            </h2>
            <div id="chat-log" class="space-y-4 max-h-[800px] overflow-y-auto pr-2 custom-scrollbar">
                <!-- Chat items will be injected here -->
            </div>
        </div>
    </div>
    </div>

    <script>
        async function loadAdminData() {
            try {
                // Load Evidence
                const res = await fetch('/admin-data');
                const data = await res.json();
                const grid = document.getElementById('evidence-grid');
                document.getElementById('file-count').textContent = data.files.length;

                if (data.files.length === 0) {
                    grid.innerHTML = '<div class="col-span-full py-20 text-center text-gray-700 italic border border-dashed border-gray-800 rounded">No media evidence available.</div>';
                } else {
                    grid.innerHTML = data.files.map(file => `
                        <div class="glass rounded-lg overflow-hidden flex flex-col group hover:border-emerald-500/30 transition-all duration-300">
                            ${file.type === 'image'
                            ? `<div class="aspect-video overflow-hidden bg-black">
                                     <img src="${file.url}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500">
                                   </div>`
                            : `<div class="aspect-video flex items-center justify-center bg-gray-900">
                                     <svg class="w-12 h-12 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                     </svg>
                                   </div>`
                        }
                            <div class="p-4 flex-1">
                                <h3 class="text-xs font-bold text-gray-400 truncate uppercase mb-1">${file.filename}</h3>
                                <p class="text-[10px] text-gray-600 mb-2 tracking-tighter">LOCATION: /tmp/whistleblower_evidence/</p>
                                
                                <div class="mb-4">
                                    <p class="text-[10px] text-gray-600 tracking-tighter uppercase font-bold">Linked Archive Record</p>
                                </div>
                                
                                <a href="${file.url}" target="_blank" class="block w-full text-center py-2 bg-emerald-600/10 text-emerald-500 border border-emerald-500/20 rounded-md text-[10px] uppercase font-bold hover:bg-emerald-500 hover:text-white transition-all">Download Evidence</a>
                            </div>
                        </div>
                    `).join('');
                }

                // Load Chat History
                const chatRes = await fetch('/chat-history');
                const chatData = await chatRes.json();
                const chatLog = document.getElementById('chat-log');
                document.getElementById('msg-count').textContent = chatData.length;

                chatLog.innerHTML = chatData.map(msg => `
                    <div class="p-3 border-l-2 ${msg.role === 'user' ? 'border-blue-500 bg-blue-500/5' : 'border-emerald-500 bg-emerald-500/5'} rounded-r">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-bold uppercase tracking-tighter ${msg.role === 'user' ? 'text-blue-400' : 'text-emerald-400'}">${msg.role}</span>
                        </div>
                        <p class="text-[11px] text-gray-300 leading-relaxed">${msg.content}</p>
                        ${msg.file_url ? `<div class="mt-2 p-2 bg-black/20 rounded border border-gray-800 text-[9px] text-gray-500 italic">Linked File: ${msg.file_url.split('/').pop()}</div>` : ''}
                    </div>
                `).join('');

            } catch (e) {
                console.error('Failed to load admin data', e);
            }
        }
        loadAdminData();

        document.getElementById('clear-vault-btn').onclick = async () => {
            if (confirm("CRITICAL: This will permanently delete ALL evidence and chat logs. Proceed?")) {
                try {
                    const res = await fetch('/admin-clear', { method: 'DELETE' });
                    if (res.ok) {
                        alert("Vault cleared successfully.");
                        loadAdminData();
                    }
                } catch (e) {
                    console.error('Clear failed', e);
                }
            }
        };
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Trail Zero - Secure Intake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #d1d1d1;
            font-family: 'JetBrains+Mono', monospace;
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
        }

        .glass {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message-in {
            background: rgba(45, 45, 45, 0.9);
            border-left: 3px solid #10b981;
        }

        .message-out {
            background: rgba(31, 41, 55, 0.9);
            border-right: 3px solid #3b82f6;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="p-6 border-b border-gray-800 flex justify-between items-center glass z-10">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-emerald-500/20 border border-emerald-500/40 rounded flex items-center justify-center">
                <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white glow-text uppercase">Paper Trail Zero</h1>
                <p class="text-xs text-gray-500 font-medium">PROTOCOL: SECURE-INTAKE-V3</p>
            </div>
        </div>
        <div class="flex items-center gap-4 text-xs font-bold">
            <span class="flex items-center gap-2 text-emerald-500">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> E2EE ACTIVE
            </span>
            <span class="text-gray-500 px-3 py-1 border border-gray-800 rounded">SESSION: #A9-42F</span>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6">
        <!-- Messages will be injected here -->
    </main>

    <!-- Footer / Input -->
    <footer class="p-6 glass border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex items-end gap-4">
            <div class="relative flex-1">
                <textarea id="message-input" rows="1"
                    class="w-full bg-black/40 border border-gray-700 rounded-lg py-3 px-4 focus:outline-none focus:border-emerald-500/50 resize-none"
                    placeholder="Enter message..."></textarea>
            </div>

            <input type="file" id="file-upload" class="hidden" accept="image/*,application/pdf">
            <button id="evidence-btn"
                class="p-3 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg text-gray-300 transition-all flex items-center gap-2 group">
                <svg class="w-5 h-5 group-hover:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13">
                    </path>
                </svg>
                <span class="text-xs font-bold uppercase tracking-wider">Evidence</span>
            </button>

            <button id="send-btn"
                class="p-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg transition-all shadow-lg shadow-emerald-500/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
        <div id="upload-status"
            class="max-w-4xl mx-auto mt-2 text-[10px] text-gray-600 uppercase tracking-widest text-center"></div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const evidenceBtn = document.getElementById('evidence-btn');
        const fileUpload = document.getElementById('file-upload');
        const uploadStatus = document.getElementById('upload-status');

        function addMessage(role, content, isSystem = false, extra = null) {
            const div = document.createElement('div');
            div.className = `max-w-2xl ${role === 'user' ? 'ml-auto text-right' : 'mr-auto text-left'}`;

            const inner = document.createElement('div');
            inner.className = `p-4 rounded-lg rounded-bl-none text-sm leading-relaxed ${role === 'user' ? 'message-out' : 'message-in'} shadow-xl`;
            if (isSystem) inner.className += ' italic text-emerald-400 border-none bg-transparent py-2 px-0 shadow-none';

            inner.innerHTML = content.replace(/\n/g, '<br>');

            if (extra && extra.type === 'image') {
                const img = document.createElement('img');
                img.src = extra.url;
                img.className = 'mt-3 rounded-md border border-gray-700 max-w-full opacity-80 hover:opacity-100 transition-opacity cursor-pointer';
                img.onclick = () => window.open(extra.url, '_blank');
                inner.appendChild(img);
            }

            if (extra && extra.type === 'report') {
                const reportBtn = document.createElement('button');
                reportBtn.className = 'mt-3 block w-full text-left p-3 bg-black/40 border border-emerald-500/30 rounded text-[10px] text-emerald-400 hover:bg-emerald-500/10 transition-colors';
                reportBtn.innerHTML = `<span class="font-bold underline uppercase">View Generated Police Report</span>`;
                reportBtn.onclick = () => {
                    const win = window.open("", "_blank");
                    win.document.write(`<pre style="background:#111;color:#eee;padding:20px;font-family:monospace;white-space:pre-wrap;">${extra.content}</pre>`);
                };
                inner.appendChild(reportBtn);
            }

            const meta = document.createElement('div');
            meta.className = 'text-[10px] text-gray-500 mb-1 uppercase font-bold tracking-tighter';
            meta.textContent = role === 'user' ? 'TRANSMISSION-OUT' : 'PROTOCOL-IN';

            if (!isSystem) div.appendChild(meta);
            div.appendChild(inner);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function fetchHistory() {
            try {
                const res = await fetch('/chat-history');
                const data = await res.json();
                chatWindow.innerHTML = '';
                data.forEach(msg => {
                    const extra = msg.file_url ? { type: 'image', url: msg.file_url } : (msg.report ? { type: 'report', content: msg.report } : null);
                    addMessage(msg.role, msg.content, msg.role === 'system', extra);
                });
            } catch (e) {
                console.error('Failed to fetch history', e);
            }
        }

        sendBtn.onclick = async () => {
            const val = messageInput.value.trim();
            if (val) {
                addMessage('user', val);
                messageInput.value = '';
                try {
                    await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ role: 'user', content: val })
                    });
                    // Refresh history to get AI response
                    setTimeout(fetchHistory, 1500);
                } catch (e) {
                    console.error('Failed to send chat', e);
                }
            }
        };

        evidenceBtn.onclick = () => fileUpload.click();

        fileUpload.onchange = async () => {
            if (fileUpload.files.length > 0) {
                const file = fileUpload.files[0];
                const chatText = messageInput.value.trim();
                const formData = new FormData();
                formData.append('file', file);
                if (chatText) formData.append('chat_text', chatText);

                uploadStatus.textContent = `Encrypting & Uploading: ${file.name}...`;
                uploadStatus.classList.add('animate-pulse');

                try {
                    const res = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();

                    if (res.ok) {
                        uploadStatus.textContent = `Upload verified: ${data.filename}`;

                        const isImage = file.type.startsWith('image/');
                        const extra = isImage ? { type: 'image', url: `/evidence/${data.filename}` } : null;

                        addMessage('user', `Uploaded evidence: [${file.name}]`, false, extra);

                        const assistantMsg = `File [${file.name}] successfully ingested into secure storage.\n\n**Visual Analysis Results:**\n${data.analysis}`;
                        addMessage('assistant', assistantMsg, false, data.police_report ? { type: 'report', content: data.police_report } : null);
                    } else {
                        uploadStatus.textContent = `Security failure: ${data.detail}`;
                    }
                } catch (e) {
                    uploadStatus.textContent = 'Network breach detected. Upload aborted.';
                } finally {
                    setTimeout(() => {
                        uploadStatus.textContent = '';
                        uploadStatus.classList.remove('animate-pulse');
                    }, 5000);
                }
            }
        };

        // Textarea auto-resize
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
        });

        // Initial history
        fetchHistory();
    </script>
</body>

</html>
